# Alembic 配置文件
# 数据库 URL 通过环境变量 OPSKG_DATABASE_URL 配置

[alembic]
# 迁移脚本目录
script_location = alembic

# 预处理修订版本 ID 的 SQL 模板文件
# prepend_sql_file = 

# 数据库 URL（通过环境变量注入）
sqlalchemy.url = sqlite:///data/opskg.db

# 日志级别
# file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(rev)s_%%(slug)s

# 版本表名称
# version_table = alembic_version

# 版本表 schema
# version_table_schema = 

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S