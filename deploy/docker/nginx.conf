# OpsKG 单镜像 nginx 配置（S13-4 多阶段构建）
#
# 路由规则：
#   /api/*     → 后端 http://127.0.0.1:8000/* （strip /api 前缀）
#   /auth/*    → 后端 http://127.0.0.1:8000/auth/* （不 strip，保留 SSO 回调路径）
#   /health    → 后端
#   /ready     → 后端
#   /metrics   → 后端（Prometheus 抓取）
#   /tracing/* → 后端
#   /          → 前端静态文件 /usr/share/nginx/html（SPA history 模式）
#
# 与 vite.config.ts 的 dev proxy 一致：/api → http://localhost:8000（strip /api）
user opskg;
worker_processes 1;
pid /tmp/nginx.pid;
daemon off;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml application/wasm;

    # 后端 upstream（同容器内 uvicorn）
    upstream opskg_backend {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    server {
        # P1-2: 非特权端口 8080（>1024），无需 root 绑定
        listen 8080;
        server_name _;

        # 前端静态文件根目录
        root /usr/share/nginx/html;
        index index.html;

        # 客户端上传文件大小（文档上传）
        client_max_body_size 100m;

        # ─── 后端反向代理：/api/v1/* → 后端 /*（strip /api/v1，P1-5 API 版本化）───
        # P1-5: 引入 /api/v1 前缀，向后兼容 /api/
        location /api/v1/ {
            proxy_pass http://opskg_backend/;  # 末尾 / 触发 URI 改写：去掉 /api/v1 前缀
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # LLM 长响应（流式生成、抽取等可能耗时较长）
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;

            # WebSocket 支持（未来实时推送）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ─── 后端反向代理：/api/* → 后端 /*（strip /api，向后兼容）───
        # 与 vite.config.ts dev proxy 一致
        # P1-5: 保留向后兼容，新客户端应使用 /api/v1/
        location /api/ {
            proxy_pass http://opskg_backend/;  # 末尾 / 触发 URI 改写：去掉 /api 前缀
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # LLM 长响应（流式生成、抽取等可能耗时较长）
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;

            # WebSocket 支持（未来实时推送）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ─── SSO 端点：/auth/* → 后端 /auth/*（不 strip）───
        # OIDC / SAML / LDAP 路由 + IdP 回调路径必须保留原样
        location /auth/ {
            proxy_pass http://opskg_backend;  # 无末尾 /，URI 原样转发
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SAML ACS 端点接收 POST body，需保留 body
            proxy_request_buffering off;
            proxy_read_timeout 60s;
        }

        # ─── 健康检查 + 监控：精确匹配 ───
        # /ready 返回 503 时 nginx 不应改写状态码
        location = /health {
            proxy_pass http://opskg_backend/health;
            proxy_set_header Host $host;
            access_log off;
        }
        location = /ready {
            proxy_pass http://opskg_backend/ready;
            proxy_set_header Host $host;
            access_log off;
        }
        location = /metrics {
            proxy_pass http://opskg_backend/metrics;
            proxy_set_header Host $host;
            access_log off;
        }

        # ─── 追踪状态 ───
        location /tracing/ {
            proxy_pass http://opskg_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── 前端静态资源：SPA history 模式 ───
        # 优先精确匹配静态文件，找不到时回落到 index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 静态资源缓存（hash 化的 assets 长期缓存）
        location ~* ^/assets/.+\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|wasm)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # index.html 不缓存（保证发布后立即生效）
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }

        # favicon
        location = /favicon.svg {
            try_files $uri =404;
            expires 1d;
        }
        location = /icons.svg {
            try_files $uri =404;
            expires 1d;
        }
    }
}
