# OpsKG Frontend Deployment + Service（S13-3 K8s 部署）
#
# ⚠️ P1-1 架构变更：此文件在单镜像架构下不再需要
# 单镜像（ghcr.io/wljmmx/only-llmwiki-comp）已包含前端静态资源 + nginx，
# 前端由 backend-deployment.yaml 中的单镜像 Pod 内 nginx 直接 serve。
# Ingress 全量转发到 opskg-backend:8080，容器内 nginx 处理 / 静态文件路由。
#
# 仅在"分离镜像架构"（独立 frontend 镜像 + 独立 backend 镜像）时使用此文件。
# 如需分离架构，需额外构建 opskg-frontend 镜像并更新 Ingress 分流规则。
#
# 前端为静态 SPA，使用 nginx serve dist/ 目录。
# - 单镜像构建在 S13-4 完成（多阶段 Dockerfile：frontend build → nginx serve）
# - 当前先创建 Deployment + Service 占位，待 S13-4 接入实际镜像
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opskg-frontend
  namespace: opskg
  labels:
    app.kubernetes.io/name: opskg-frontend
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: opskg-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: opskg-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opskg-frontend
        app.kubernetes.io/component: web
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: opskg-frontend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: frontend
          # 镜像将在 S13-4 构建为 opskg-frontend:latest
          # 多阶段构建：node:20 build → nginx:stable serve
          image: opskg-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          # Liveness：nginx 进程存活
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          # Readiness：nginx 可响应
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
# Frontend Service
# - 集群内访问：http://opskg-frontend.opskg.svc.cluster.local:80
# - Ingress 通过此 Service 转发 / 请求（静态资源）
apiVersion: v1
kind: Service
metadata:
  name: opskg-frontend
  namespace: opskg
  labels:
    app.kubernetes.io/name: opskg-frontend
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: opskg-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
# Frontend HPA
# 前端为静态资源，CPU/内存占用低，扩缩容阈值相对宽松
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: opskg-frontend
  namespace: opskg
  labels:
    app.kubernetes.io/name: opskg-frontend
    app.kubernetes.io/component: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: opskg-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
