# OpsKG 单镜像 Deployment + Service（P1-1: 匹配单镜像架构）
#
# 架构变更（P1-1）：
#   原设计：backend 独立镜像（8000）+ frontend 独立镜像（80）+ Ingress 分流
#   新设计：单镜像（nginx:8080 + uvicorn:8000 + supervisord），Ingress 全量转发
#
# 单镜像内部 nginx 已处理路由：
#   /api/*     → uvicorn:8000/*（strip /api）
#   /auth/*    → uvicorn:8000/auth/*（不 strip，SSO 回调）
#   /health    → uvicorn:8000/health
#   /ready     → uvicorn:8000/ready
#   /metrics   → uvicorn:8000/metrics
#   /          → 前端静态文件（SPA）
#
# 设计要点：
#   1. 使用 Deployment（无状态），便于水平扩展；SQLite DB 通过 PVC 共享
#      注：SQLite WAL 模式下，多实例并发写入需共享文件系统（NFS / CephFS）
#      生产建议 DEPLOYMENT_MODE=replicated + 共享存储，或迁移到 PostgreSQL/MySQL
#   2. Liveness 探针 → /health（HTTP 200 = 进程存活）
#   3. Readiness 探针 → /ready（HTTP 200 = 依赖可用，HTTP 503 = 摘除流量）
#   4. 启动时引导 admin 用户（OPSKG_BOOTSTRAP_ADMIN_* 环境变量）
#   5. 通过 envFrom 一次性注入 ConfigMap + Secret，避免冗余声明
#   6. P1-2: 非 root 用户运行（securityContext runAsNonRoot）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opskg-backend
  namespace: opskg
  labels:
    app.kubernetes.io/name: opskg-backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: opskg-platform
spec:
  # 多副本：DEPLOYMENT_MODE=replicated + 共享存储时支持 HA
  # 单实例调试可改为 1
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # 滚动更新时保证至少 replicas-1 个可用
  selector:
    matchLabels:
      app.kubernetes.io/name: opskg-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opskg-backend
        app.kubernetes.io/component: api
      annotations:
        # 配置变更时自动滚动更新（kubectl rollout restart 的替代方案）
        checksum/config: "placeholder"
    spec:
      # 反亲和：让两个副本调度到不同节点（提高可用性）
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: opskg-backend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: opskg
          # P1-1: 使用单镜像（含前端 + 后端 + nginx）
          image: ghcr.io/wljmmx/only-llmwiki-comp:${OPSKG_VERSION:-0.0.1}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080  # P1-2: 非特权端口
          # 从 ConfigMap + Secret 注入环境变量
          envFrom:
            - configMapRef:
                name: opskg-config
            - secretRef:
                name: opskg-secret
          # 额外环境变量（无法放入 ConfigMap/Secret 的动态值）
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: INSTANCE_ID
              value: "$(POD_NAME)"
          volumeMounts:
            - name: data
              mountPath: /app/data
              readOnly: false
          # Liveness：进程存活探针
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          # Readiness：就绪探针
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Startup：启动探针（uvicorn 加载较慢时避免被 liveness 杀掉）
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 30  # 最多等 5 分钟
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          # P1-2: 安全上下文 — 非 root 运行
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000  # opskg 用户
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # uvicorn 需写 /tmp
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: opskg-backend-data
---
# Backend Service
# P1-1: 单镜像架构 — Service 暴露 8080 端口（nginx 入口）
# - 集群内访问：http://opskg-backend.opskg.svc.cluster.local:8080
# - Ingress 全量转发到此 Service（容器内 nginx 处理 /api strip 等路由）
apiVersion: v1
kind: Service
metadata:
  name: opskg-backend
  namespace: opskg
  labels:
    app.kubernetes.io/name: opskg-backend
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: opskg-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
