# OpsKG Backend PVC（S13-3 K8s 部署）
#
# 持久化后端 SQLite 数据库：
#   - documents.db      文档元数据 + chunks
#   - search_index.db   向量索引（FAISS / sqlite-vss）
#   - templates.db      文档模板
#   - versions.db       文档版本历史
#   - auth.db           用户 + session + OIDC/SAML/LDAP 映射
#   - uploads/          原始文档上传目录（L1 Raw Layer）
#
# 重要：多副本部署时必须使用 ReadWriteMany 的存储类（NFS / CephFS / Azure Files），
#       否则 SQLite WAL 模式下并发写入会损坏数据。
#       storageClassName: nfs-client / cephfs / azurefile-csi-premium
#
# 单实例部署可使用 ReadWriteOnce + standard 存储类。
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opskg-backend-data
  namespace: opskg
  labels:
    app.kubernetes.io/name: opskg-backend
    app.kubernetes.io/component: storage
spec:
  # 多副本共享存储：ReadWriteMany；单实例：ReadWriteOnce
  accessModes:
    - ReadWriteMany
  # 存储类：
  #   - standard（GKE default）/ gp2（AWS EBS）/ standard-rwo（GCE PD）— ReadWriteOnce
  #   - nfs-client / cephfs / azurefile — ReadWriteMany
  storageClassName: nfs-client
  resources:
    requests:
      storage: 50Gi
