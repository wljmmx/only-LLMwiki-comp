# OpsKG Ingress（S13-3 + S13-4 K8s 部署）
#
# 路由规则：
#   /api/*              → opskg-backend:8000/*       （strip /api 前缀）
#   /auth/*             → opskg-backend:8000/auth/*   （不 strip，SSO 回调路径必须保留）
#   /health             → opskg-backend:8000/health
#   /ready              → opskg-backend:8000/ready
#   /metrics            → opskg-backend:8000/metrics
#   /tracing/*          → opskg-backend:8000/tracing/*
#   /                   → opskg-frontend:80           （SPA 静态资源）
#
# 拆分两个 Ingress 的原因：
#   nginx-ingress 的 rewrite-target 注解作用于整个 Ingress。/api 需要 strip 前缀，
#   而 /auth /health /ready /metrics 不能 strip（后端原样暴露）。
#   因此将需要 rewrite 的 /api 单独成 Ingress，其余路由放另一个 Ingress。
#
# 前置要求：
#   1. 集群已安装 Ingress controller（nginx-ingress）
#   2. DNS 已将 opskg.example.com 解析到 Ingress controller 的外网 IP
#   3. 已配置 TLS 证书（推荐 cert-manager 自动签发 Let's Encrypt）
---
# ────────── Ingress 1: /api/* → backend（strip /api 前缀）──────────
# 与 Docker 单镜像 nginx.conf + vite dev proxy 行为一致
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opskg-ingress-api
  namespace: opskg
  labels:
    app.kubernetes.io/name: opskg-ingress
    app.kubernetes.io/component: api-routing
    app.kubernetes.io/part-of: opskg-platform
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # 启用正则路径匹配
    nginx.ingress.kubernetes.io/use-regex: "true"
    # /api(/|$)(.*) 匹配 /api/xxx，$2 捕获 xxx，rewrite-target /$2 → backend /xxx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # 客户端上传文件大小限制
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    # LLM 长响应（流式生成、抽取等可能耗时较长）
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  # tls:
  #   - hosts:
  #       - opskg.example.com
  #     secretName: opskg-tls
  rules:
    - host: opskg.example.com
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: opskg-backend
                port:
                  name: http
---
# ────────── Ingress 2: /auth/* /health /ready /metrics /tracing/* / → 各 Service（无 rewrite）──────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opskg-ingress-web
  namespace: opskg
  labels:
    app.kubernetes.io/name: opskg-ingress
    app.kubernetes.io/component: web-routing
    app.kubernetes.io/part-of: opskg-platform
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # WebSocket 支持
    nginx.ingress.kubernetes.io/websocket-services: "opskg-backend"
    # HSTS（生产推荐开启）
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # cert-manager 自动签发（取消注释启用）
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  # tls:
  #   - hosts:
  #       - opskg.example.com
  #     secretName: opskg-tls
  rules:
    - host: opskg.example.com
      http:
        paths:
          # SSO 端点（OIDC / SAML / LDAP，IdP 回调路径，不能 strip）
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: opskg-backend
                port:
                  name: http
          # 健康检查 + 监控
          - path: /health
            pathType: Exact
            backend:
              service:
                name: opskg-backend
                port:
                  name: http
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: opskg-backend
                port:
                  name: http
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: opskg-backend
                port:
                  name: http
          - path: /tracing
            pathType: Prefix
            backend:
              service:
                name: opskg-backend
                port:
                  name: http
          # 前端静态资源（兜底）
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opskg-frontend
                port:
                  name: http
