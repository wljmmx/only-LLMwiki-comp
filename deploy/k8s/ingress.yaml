# OpsKG Ingress（P1-1: 单镜像架构简化）
#
# 架构变更（P1-1）：
#   原设计：双 Ingress（/api/* → backend:8000 strip，其余 → backend:8000 或 frontend:80）
#   新设计：单 Ingress（全量 → opskg-backend:8080）
#
# 单镜像内部 nginx 已处理所有路由：
#   /api/*     → uvicorn:8000/*（strip /api）
#   /auth/*    → uvicorn:8000/auth/*（不 strip，SSO 回调）
#   /health    → uvicorn:8000/health
#   /ready     → uvicorn:8000/ready
#   /metrics   → uvicorn:8000/metrics
#   /          → 前端静态文件（SPA）
#
# 因此 Ingress 只需将所有流量转发到 opskg-backend:8080，无需 rewrite-target
#
# 前置要求：
#   1. 集群已安装 Ingress controller（nginx-ingress）
#   2. DNS 已将 opskg.example.com 解析到 Ingress controller 的外网 IP
#   3. 已配置 TLS 证书（推荐 cert-manager 自动签发 Let's Encrypt）
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opskg-ingress
  namespace: opskg
  labels:
    app.kubernetes.io/name: opskg-ingress
    app.kubernetes.io/component: routing
    app.kubernetes.io/part-of: opskg-platform
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # 客户端上传文件大小限制
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    # LLM 长响应（流式生成、抽取等可能耗时较长）
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # WebSocket 支持（实时协作 / SSE 流式）
    nginx.ingress.kubernetes.io/websocket-services: "opskg-backend"
    # HSTS（生产推荐开启）
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # cert-manager 自动签发（取消注释启用）
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  # tls:
  #   - hosts:
  #       - opskg.example.com
  #     secretName: opskg-tls
  rules:
    - host: opskg.example.com
      http:
        paths:
          # P1-1: 全量转发到单镜像 Service
          # 容器内 nginx 处理 /api strip、/auth、/health、/ 静态文件等路由
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opskg-backend
                port:
                  name: http
