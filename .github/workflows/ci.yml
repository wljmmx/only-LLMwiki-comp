# OpsKG CI — 质量门禁
# 触发：push / PR 到任意分支
# 作业：后端 lint + pytest + verify 脚本；前端 typecheck + vitest + build
# 验证点：61 pytest + 470 verify + 86 vitest = 617 个自动化验证点

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# 同一分支新 push 取消旧 run，节省 CI 资源
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────── 后端：lint + pytest + verify ──────────
  backend:
    name: Backend (lint + pytest + verify)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check backend/app/ scripts/

      - name: Pytest
        working-directory: backend
        env:
          PYTHONPATH: .
        run: python -m pytest tests/ -q --no-header

      - name: Verify scripts (470 验证点)
        env:
          PYTHONPATH: backend
        # 11 个 verify 脚本，任一失败即 CI 失败
        # 覆盖：auth(60) + oidc(80) + ha(32) + webhook(62) + observability(19) +
        #       tracing(39) + p2_4_3(44) + p2_4_6(41) + p2_4_7(46) + p2_5_5(19) + p2_5_8(28) = 470
        run: |
          set -e
          for script in \
            verify_auth \
            verify_oidc \
            verify_ha \
            verify_webhook \
            verify_observability \
            verify_tracing \
            verify_p2_4_3 \
            verify_p2_4_6 \
            verify_p2_4_7 \
            verify_p2_5_5 \
            verify_p2_5_8; do
            echo "=== 运行 ${script}.py ==="
            python scripts/${script}.py
          done

  # ────────── 前端：typecheck + vitest + build ──────────
  frontend:
    name: Frontend (typecheck + vitest + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (vue-tsc)
        run: npm run typecheck

      - name: Vitest
        run: npm test

      - name: Build
        run: npm run build
