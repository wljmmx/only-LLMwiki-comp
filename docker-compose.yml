# OpsKG 运维知识图谱 - 全栈部署
# 使用: docker compose up -d

services:
  # ========== Neo4j 图数据库 ==========
  neo4j:
    image: neo4j:5-community
    container_name: opskg-neo4j
    ports:
      - "7474:7474"   # HTTP
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1g
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-password}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ========== OpsKG Backend ==========
  backend:
    build: .
    container_name: opskg-backend
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - LOG_LEVEL=INFO
      # LLM 配置
      - LLM_BACKEND=${LLM_BACKEND:-openai_compat}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - OPENAI_COMPAT_BASE_URL=${OPENAI_COMPAT_BASE_URL:-https://api.deepseek.com/v1}
      - OPENAI_COMPAT_API_KEY=${OPENAI_COMPAT_API_KEY:-}
      - OPENAI_COMPAT_MODEL=${OPENAI_COMPAT_MODEL:-deepseek-chat}
      # Neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      # 抽取门控
      - CONFIDENCE_AUTO=0.85
      - CONFIDENCE_REVIEW=0.60
    volumes:
      - backend_data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  backend_data: