# OpsKG 运维知识图谱 - 全栈部署（单镜像含前后端）
#
# 一键部署（推荐）：
#   1. curl -sSL https://raw.githubusercontent.com/wljmmx/only-LLMwiki-comp/main/.env.example -o .env
#   2. 编辑 .env（至少配置 OPENAI_COMPAT_API_KEY；也可留空，启动后由 UI Setup Wizard 引导）
#   3. docker compose up -d
#   4. 访问 http://localhost:8080（首次自动跳转 Setup Wizard）
#
# 镜像说明:
#   ghcr.io/wljmmx/only-llmwiki-comp:0.0.1 单镜像内含:
#     - nginx（前端静态资源 + 反向代理 /api → uvicorn:8000）
#     - uvicorn（后端 FastAPI）
#     - supervisord（进程管理，自动重启）
#   数据持久化: backend_data 卷挂载到 /app/data
#
# 注：如需从源码构建（如修改代码后），将 image 改为 build: .

services:
  # ========== Neo4j 图数据库（可选，缺失时图功能降级） ==========
  neo4j:
    image: neo4j:5-community
    container_name: opskg-neo4j
    ports:
      - "7474:7474"   # HTTP（Neo4j Browser 控制台）
      - "7687:7687"   # Bolt（Cypher 协议）
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1g
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-password}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ========== OpsKG 单镜像（前端 + 后端 + nginx） ==========
  opskg:
    # 从源码构建（确保包含最新修复，如 nginx 非 root 启动修复）
    # 如需使用 ghcr.io 预构建镜像，注释 build 行，取消注释 image 行
    # 注：v0.0.1 预构建镜像不含 nginx 非 root 修复，建议从源码构建或使用 latest 标签
    build: .
    # image: ghcr.io/wljmmx/only-llmwiki-comp:${OPSKG_VERSION:-0.0.1}
    container_name: opskg
    ports:
      - "${OPSKG_PORT:-8080}:8080"   # nginx（非特权端口，前端 + /api 反代）
    environment:
      - ENV=${ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OPSKG_UVICORN_WORKERS=${OPSKG_UVICORN_WORKERS:-2}
      # LLM 配置
      - LLM_BACKEND=${LLM_BACKEND:-openai_compat}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-120}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-4096}
      - OPENAI_COMPAT_BASE_URL=${OPENAI_COMPAT_BASE_URL:-https://api.deepseek.com/v1}
      - OPENAI_COMPAT_API_KEY=${OPENAI_COMPAT_API_KEY:-}
      - OPENAI_COMPAT_MODEL=${OPENAI_COMPAT_MODEL:-deepseek-chat}
      # Ollama（LLM_BACKEND=ollama 时使用）
      # 容器内访问宿主 Ollama 必须用 host.docker.internal（非 localhost）
      # WSL2/Win: Ollama 需设置 OLLAMA_HOST=0.0.0.0:11434 监听所有接口
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      # vLLM（LLM_BACKEND=vllm 时使用）
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:8000}
      - VLLM_MODEL=${VLLM_MODEL:-Qwen2.5-14B-Instruct}
      # Embedding（留空关闭向量检索）
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-}
      # Neo4j
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      # 抽取门控
      - CONFIDENCE_AUTO=${CONFIDENCE_AUTO:-0.85}
      - CONFIDENCE_REVIEW=${CONFIDENCE_REVIEW:-0.60}
      # 认证（留空关闭=dev 模式；生产请设置 OPSKG_API_TOKEN 或用 bootstrap admin）
      - OPSKG_API_TOKEN=${OPSKG_API_TOKEN:-}
      - OPSKG_BOOTSTRAP_ADMIN_USER=${OPSKG_BOOTSTRAP_ADMIN_USER:-admin}
      - OPSKG_BOOTSTRAP_ADMIN_PASSWORD=${OPSKG_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      # 可观测性
      - OPSKG_TRACING_ENABLED=${OPSKG_TRACING_ENABLED:-0}
      - OPSKG_OTLP_ENDPOINT=${OPSKG_OTLP_ENDPOINT:-}
      # HA
      - OPSKG_DEPLOYMENT_MODE=${OPSKG_DEPLOYMENT_MODE:-standalone}
      - OPSKG_INSTANCE_ID=${OPSKG_INSTANCE_ID:-}
    volumes:
      - backend_data:/app/data
    # 允许容器通过 host.docker.internal 访问宿主服务（Ollama/vLLM 等）
    # Docker Desktop 默认支持；Linux Docker Engine 需此声明（host-gateway 是 20.10+ 特殊关键字）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  backend_data:
